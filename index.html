<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Random Quote Generator</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <h1>Famous Quotes Generator</h1>

      <p class="subtitle">Press the button to generate a random quote</p>

      <button id="generateBtn">Generate Quote</button>

      <div class="quote-box">
        <p id="quote">Your quote will appear here...</p>

        <p id="author"></p>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
